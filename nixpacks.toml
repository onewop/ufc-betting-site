[phases.setup]
nixPkgs = ["python3", "postgresql_16.dev", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r backend/requirements.txt"]

[phases.build]
cmds = ["test -f public/this_weeks_stats.json && echo 'BUILD OK: public/this_weeks_stats.json found' || (echo 'BUILD FAIL: public/this_weeks_stats.json missing from build context' && exit 1)"]

[start]
cmd = "cd /app/backend && /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
